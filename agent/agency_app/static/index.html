<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>bux agency</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <span class="brand">bux agency</span>
    <span class="counter" id="counter"></span>
  </header>

  <main id="stack" aria-live="polite"></main>

  <section id="empty" hidden>
    <p>deck empty — looking for new ideas…</p>
    <button id="refresh" type="button">refresh</button>
  </section>

  <footer>
    <button class="action no" id="btn-left" aria-label="dismiss">✕</button>
    <button class="action up" id="btn-up" aria-label="feedback">↑</button>
    <button class="action yes" id="btn-right" aria-label="accept">✓</button>
  </footer>

  <dialog id="feedback-modal">
    <form method="dialog">
      <h2 id="feedback-title">give feedback</h2>
      <p id="feedback-context"></p>
      <!-- TODO V2: replace this textarea with Web Speech API mic capture
           (start/stop mic button, render interim transcript, submit final). -->
      <textarea id="feedback-text" placeholder="what would you change?" rows="4"></textarea>
      <menu>
        <button id="feedback-cancel" type="button">cancel</button>
        <button id="feedback-submit" type="button" class="primary">send</button>
      </menu>
    </form>
  </dialog>

  <div id="toast" hidden></div>

  <script src="/static/main.js" type="module"></script>
</body>
</html>
